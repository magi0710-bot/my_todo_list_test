<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>交易 Check List (本地強化修正版)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #2e2e2e;
    --accent: #c8a96e;
    --accent2: #7eb8c8;
    --accent3: #c87e7e;
    --text: #e8e0d4;
    --text-muted: #7a7268;
    --check-yes: #6ebd8f;
    --check-no: #2e2e2e;
    --radius: 10px;
    --section-gap: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto+Serif+TC', serif;
    line-height: 1.6;
    padding: 20px;
    max-width: 800px;
    margin: 0 auto;
  }

  /* 這裡保留您原本所有的 CSS 樣式... */
  header { margin-bottom: 30px; text-align: center; }
  h1 { color: var(--accent); font-weight: 700; letter-spacing: 2px; }
  .setup-section { background: var(--surface2); padding: 15px; border-radius: var(--radius); margin-bottom: var(--section-gap); border: 1px solid var(--border); }
  .input-group { margin-bottom: 15px; }
  label { display: block; color: var(--text-muted); font-size: 0.9em; margin-bottom: 5px; }
  input, textarea, select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 6px; font-family: inherit; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: var(--section-gap); box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
  .check-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin: 15px 0; }
  .check-item { background: var(--surface2); padding: 15px; border-radius: 8px; cursor: pointer; border-left: 4px solid var(--check-no); transition: 0.2s; display: flex; align-items: center; justify-content: space-between; }
  .check-item.checked { border-left-color: var(--check-yes); background: rgba(110, 189, 143, 0.1); }
  .check-item.checked::after { content: '✓'; color: var(--check-yes); font-weight: bold; }
  .btn-primary { background: var(--accent); color: #000; border: none; padding: 15px; width: 100%; border-radius: var(--radius); font-weight: 700; cursor: pointer; font-size: 1.1em; margin-top: 10px; }
  .history-item { background: var(--surface2); padding: 12px; margin-top: 10px; border-radius: 6px; font-size: 0.85em; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 10px 20px; border-radius: 30px; font-weight: 600; opacity: 0; transition: 0.3s; z-index: 1000; pointer-events: none; }
  #toast.show { opacity: 1; bottom: 50px; }
  #toast.error { background: var(--accent3); color: #fff; }
</style>
</head>
<body>

<header>
  <h1>TRADING LOG</h1>
  <p style="color:var(--text-muted); font-size:0.8em; margin-top:5px;">Professional Checklist & Journal</p>
</header>

<div class="setup-section">
  <div class="input-group">
    <label>預設存檔目錄 (FileSystem API)</label>
    <div style="display:flex; gap:10px;">
      <button class="btn-primary" onclick="setupDirectory()" style="margin:0; padding:8px; font-size:0.9em;">設定資料夾</button>
      <button class="btn-primary" onclick="clearDirectory()" style="margin:0; padding:8px; font-size:0.9em; background:var(--surface2); color:var(--accent);">清除設定</button>
    </div>
    <div id="dirStatus" style="font-size:0.8em; margin-top:8px; color:var(--accent2);">未設定資料夾</div>
  </div>
</div>

<div class="card">
  <div class="input-group">
    <label>交易標的 (Symbol)</label>
    <input type="text" id="symbolInput" placeholder="例如: BTCUSDT" oninput="updateProgress()">
  </div>

  <div class="input-group">
    <label>進場情緒 (Entry Emotion)</label>
    <textarea id="entryEmotion" rows="2" placeholder="目前心理狀態、恐懼或貪婪程度..."></textarea>
  </div>

  <div class="check-grid" id="checklistContainer">
    </div>

  <div class="input-group">
    <label>持倉情緒 (Keeping Emotion)</label>
    <textarea id="keepEmotion" rows="2" placeholder="持倉中的壓力感、是否想提前平倉..."></textarea>
  </div>

  <div class="input-group">
    <label>出場情緒 (Exit Emotion)</label>
    <textarea id="closeEmotion" rows="2" placeholder="結清後的感受、是否有報復心態..."></textarea>
  </div>

  <button class="btn-primary" id="saveBtn" onclick="handleSave()">儲存交易紀錄</button>
</div>

<div id="historyList"></div>
<div id="toast">訊息提示</div>

<script>
const CHECKLIST_ITEMS = [
    "是否符合大週期趨勢？",
    "關鍵壓力/支撐位是否已標註？",
    "是否有明確的進場訊號 (SOP)？",
    "止損位是否已設定且符合 R:R？",
    "倉位大小是否符合風險管理？",
    "是否排除情緒化跟單或報復交易？"
];

let historyData = [];

// 初始化
window.onload = async () => {
    const container = document.getElementById('checklistContainer');
    CHECKLIST_ITEMS.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'check-item';
        div.textContent = item;
        div.onclick = () => {
            div.classList.toggle('checked');
            updateProgress();
        };
        container.appendChild(div);
    });

    const savedHistory = localStorage.getItem('trading_history');
    if (savedHistory) {
        historyData = JSON.parse(savedHistory);
        renderHistory();
    }
    
    const dir = await getHandle("defaultDir");
    if(dir) document.getElementById('dirStatus').textContent = "✅ 已連結: " + dir.name;
};

function updateProgress() {
    const total = CHECKLIST_ITEMS.length;
    const checked = document.querySelectorAll('.check-item.checked').length;
    const btn = document.getElementById('saveBtn');
    btn.textContent = `儲存交易紀錄 (${checked}/${total})`;
}

// --- FileSystem API 邏輯 ---

async function getDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open("FileStore", 1);
        request.onupgradeneeded = e => e.target.result.createObjectStore("handles");
        request.onsuccess = e => resolve(e.target.result);
        request.onerror = e => reject(e.error);
    });
}

async function setHandle(key, handle) {
    const db = await getDB();
    const tx = db.transaction("handles", "readwrite");
    tx.objectStore("handles").put(handle, key);
    return new Promise(res => tx.oncomplete = res);
}

async function getHandle(key) {
    const db = await getDB();
    const tx = db.transaction("handles", "readonly");
    const request = tx.objectStore("handles").get(key);
    return new Promise(res => request.onsuccess = () => res(request.result));
}

async function setupDirectory() {
    try {
        const handle = await window.showDirectoryPicker();
        await setHandle("defaultDir", handle);
        document.getElementById('dirStatus').textContent = "✅ 已連結: " + handle.name;
        showToast('資料夾設定成功', 'success');
    } catch (e) {
        showToast('取消設定', 'error');
    }
}

async function clearDirectory() {
    const db = await getDB();
    const tx = db.transaction("handles", "readwrite");
    tx.objectStore("handles").delete("defaultDir");
    document.getElementById('dirStatus').textContent = "未設定資料夾";
    showToast('設定已清除');
}

// --- 核心修正：儲存邏輯 ---

async function handleSave() {
    const symbol = document.getElementById('symbolInput').value || 'UNKNOWN';
    // 過濾檔名非法字元
    const safeSymbol = symbol.replace(/[/\\?%*:|"<>]/g, '-');
    const now = new Date();
    const timeStr = `${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2,'0')}${now.getDate().toString().padStart(2,'0')}_${now.getHours().toString().padStart(2,'0')}${now.getMinutes().toString().padStart(2,'0')}`;
    const filename = `Trade_${timeStr}_${safeSymbol}.md`;

    const md = buildMarkdown(symbol);
    
    // 儲存至本地歷史 (LocalStorage)
    const record = {
        id: Date.now(),
        time: now.toLocaleString(),
        symbol: symbol,
        markdown: md
    };
    historyData.unshift(record);
    localStorage.setItem('trading_history', JSON.stringify(historyData.slice(0, 50)));
    renderHistory();

    // 執行檔案寫入
    await saveToFileSystem(filename, md);
}

async function saveToFileSystem(filename, md) {
    if (!md || md.trim().length < 10) {
        showToast('錯誤：內容過短或為空', 'error');
        return;
    }

    try {
        const dirHandle = await getHandle("defaultDir");
        if (dirHandle) {
            // 關鍵修正：主動請求讀寫權限
            const options = { mode: 'readwrite' };
            if (await dirHandle.queryPermission(options) !== 'granted') {
                showToast('請在瀏覽器上方點選「允許」權限', 'success');
                if (await dirHandle.requestPermission(options) !== 'granted') {
                    throw new Error('使用者拒絕寫入權限');
                }
            }

            const handle = await dirHandle.getFileHandle(filename, { create: true });
            const writable = await handle.createWritable();
            
            // 使用 Blob 確保編碼正確
            const blob = new Blob([md], { type: 'text/markdown' });
            await writable.write(blob);
            await writable.close(); // 必須 await，確保寫入流完成
            
            showToast('✅ 成功存入本地資料夾', 'success');
            return;
        }
    } catch (e) {
        console.error('FS API Error:', e);
        showToast('本地寫入失敗：' + e.message, 'error');
    }

    // Fallback: 備用傳統下載
    saveByDownload(filename, md);
}

function saveByDownload(filename, md) {
    try {
        const blob = new Blob([md], { type: 'text/markdown' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        setTimeout(() => {
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }, 100);
        showToast('已觸發瀏覽器下載', 'success');
    } catch (err) {
        showToast('下載失敗', 'error');
    }
}

function buildMarkdown(symbol) {
    const entry = document.getElementById('entryEmotion').value;
    const keep = document.getElementById('keepEmotion').value;
    const exit = document.getElementById('closeEmotion').value;
    const checks = document.querySelectorAll('.check-item');
    
    let md = `# Trading Log: ${symbol}\n`;
    md += `Date: ${new Date().toLocaleString()}\n\n`;
    
    md += `## 1. Entry Emotion\n${entry || 'None'}\n\n`;
    
    md += `## 2. Checklist\n`;
    checks.forEach((item, i) => {
        const isChecked = item.classList.contains('checked');
        md += `${isChecked ? '[x]' : '[ ]'} ${CHECKLIST_ITEMS[i]}\n`;
    });
    
    md += `\n## 3. Keeping Emotion\n${keep || 'None'}\n\n`;
    md += `## 4. Exit Emotion\n${exit || 'None'}\n`;
    
    return md;
}

function renderHistory() {
    const list = document.getElementById('historyList');
    list.innerHTML = `<h3 style="margin-top:30px; color:var(--accent2);">History Logs</h3>`;
    historyData.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `
            <span>${item.time} - <strong>${item.symbol}</strong></span>
            <button onclick="copyMd(${index})" style="background:none; border:none; color:var(--accent); cursor:pointer;">Copy MD</button>
        `;
        list.appendChild(div);
    });
}

function copyMd(index) {
    navigator.clipboard.writeText(historyData[index].markdown);
    showToast('Markdown 已複製');
}

function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show' + (type ? ' ' + type : '');
    setTimeout(() => t.className = '', 3000);
}
</script>

</body>
</html>
