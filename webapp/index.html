<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新增警報</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --surface: #f4f4f5;
    --border: #e0e0e0;
    --text: #1a1a1a;
    --text-secondary: #666666;
    --accent: #0088cc;
    --accent-text: #ffffff;
    --btn-bg: #f0f0f0;
    --btn-active-bg: #0088cc;
    --btn-active-text: #ffffff;
    --input-bg: #ffffff;
    --error: #e53935;
    --preview-bg: #e8f4fd;
    --preview-text: #0d47a1;
    --submit-bg: #0088cc;
    --submit-disabled: #b0bec5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --surface: #2c2c2e;
      --border: #3a3a3c;
      --text: #f0f0f0;
      --text-secondary: #aaaaaa;
      --btn-bg: #3a3a3c;
      --input-bg: #2c2c2e;
      --preview-bg: #1a2a3a;
      --preview-text: #64b5f6;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
    min-height: 100vh;
  }
  h1 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 20px;
  }
  .section {
    margin-bottom: 20px;
  }
  .section-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .chip-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 8px;
  }
  .chip {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--btn-bg);
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .chip.active {
    background: var(--btn-active-bg);
    border-color: var(--btn-active-bg);
    color: var(--btn-active-text);
  }
  input[type="text"], input[type="number"], select {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--input-bg);
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus, input[type="number"]:focus, select:focus {
    border-color: var(--accent);
  }
  input.error {
    border-color: var(--error);
  }
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-secondary);
    font-size: 13px;
    margin: 12px 0;
  }
  .divider::before, .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .preview-box {
    background: var(--preview-bg);
    color: var(--preview-text);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 16px;
    min-height: 44px;
    display: flex;
    align-items: center;
  }
  .validation-msg {
    font-size: 12px;
    color: var(--error);
    margin-top: 6px;
    min-height: 16px;
  }
  .submit-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: var(--submit-bg);
    color: #ffffff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }
  .submit-btn:disabled {
    background: var(--submit-disabled);
    cursor: not-allowed;
  }
  .submit-btn:not(:disabled):active {
    opacity: 0.85;
  }
</style>
</head>
<body>
<h1>🔔 新增警報</h1>

<!-- Symbol -->
<div class="section">
  <div class="section-label">商品</div>
  <div class="chip-group" id="symbolChips">
    <button class="chip" data-symbol="EURUSD" onclick="selectSymbol(this)">EURUSD</button>
    <button class="chip" data-symbol="GBPUSD" onclick="selectSymbol(this)">GBPUSD</button>
    <button class="chip" data-symbol="USDJPY" onclick="selectSymbol(this)">USDJPY</button>
    <button class="chip" data-symbol="XAUUSD" onclick="selectSymbol(this)">XAUUSD</button>
  </div>
  <input type="text" id="symbolInput" placeholder="或輸入商品代碼..." autocomplete="off"
    oninput="onSymbolInput(this)" />
  <div class="validation-msg" id="symbolMsg"></div>
</div>

<!-- Timeframe -->
<div class="section">
  <div class="section-label">Timeframe</div>
  <select id="tfSelect" onchange="updatePreview()">
    <option value="5m">5M</option>
    <option value="15m">15M</option>
    <option value="1h" selected>1H</option>
    <option value="4h">4H</option>
    <option value="1d">1D</option>
  </select>
</div>

<!-- Trigger condition -->
<div class="section">
  <div class="section-label">觸發條件（擇一）</div>

  <input type="number" id="priceInput" placeholder="輸入價格，例如 1.5606" step="any"
    oninput="onPriceInput()" />
  <div class="validation-msg" id="priceMsg"></div>

  <div class="divider">或選擇指標</div>

  <div class="chip-group" id="indicatorChips">
    <button class="chip" data-indicator="EMA" data-param="20" onclick="selectIndicator(this)">EMA 20</button>
    <button class="chip" data-indicator="EMA" data-param="50" onclick="selectIndicator(this)">EMA 50</button>
    <button class="chip" data-indicator="BB" data-param="UPPER" onclick="selectIndicator(this)">BB 上軌</button>
    <button class="chip" data-indicator="BB" data-param="LOWER" onclick="selectIndicator(this)">BB 下軌</button>
  </div>
  <div class="validation-msg" id="triggerMsg"></div>
</div>

<!-- Preview -->
<div class="preview-box" id="previewBox">請填寫商品與觸發條件</div>

<!-- Submit -->
<button class="submit-btn" id="submitBtn" disabled onclick="submit()">送出警報</button>

<script>
  const tg = window.Telegram && window.Telegram.WebApp;
  if (tg) {
    tg.expand();
    // Apply Telegram theme colors if available
    if (tg.colorScheme === 'dark') {
      document.documentElement.style.setProperty('--bg', tg.themeParams.bg_color || '#1c1c1e');
      document.documentElement.style.setProperty('--text', tg.themeParams.text_color || '#f0f0f0');
    }
  }

  let selectedIndicator = null;  // { indicator, param } or null

  function selectSymbol(btn) {
    document.querySelectorAll('#symbolChips .chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('symbolInput').value = btn.dataset.symbol;
    updatePreview();
  }

  function onSymbolInput(input) {
    input.value = input.value.toUpperCase();
    document.querySelectorAll('#symbolChips .chip').forEach(c => {
      c.classList.toggle('active', c.dataset.symbol === input.value);
    });
    updatePreview();
  }

  function selectIndicator(btn) {
    const wasActive = btn.classList.contains('active');
    document.querySelectorAll('#indicatorChips .chip').forEach(c => c.classList.remove('active'));
    if (!wasActive) {
      btn.classList.add('active');
      selectedIndicator = { indicator: btn.dataset.indicator, param: btn.dataset.param };
    } else {
      selectedIndicator = null;
    }
    const priceInput = document.getElementById('priceInput');
    if (selectedIndicator) {
      priceInput.placeholder = '（已選擇指標，價格將被忽略）';
    } else {
      priceInput.placeholder = '輸入價格，例如 1.5606';
    }
    updatePreview();
  }

  function onPriceInput() {
    const val = document.getElementById('priceInput').value;
    const msg = document.getElementById('priceMsg');
    if (val && isNaN(parseFloat(val))) {
      document.getElementById('priceInput').classList.add('error');
      msg.textContent = '請輸入有效數字';
    } else {
      document.getElementById('priceInput').classList.remove('error');
      msg.textContent = '';
    }
    updatePreview();
  }

  function getSymbol() {
    return document.getElementById('symbolInput').value.trim().toUpperCase();
  }

  function getTf() {
    return document.getElementById('tfSelect').value;  // e.g. "1h"
  }

  function getPrice() {
    const v = document.getElementById('priceInput').value.trim();
    return v && !isNaN(parseFloat(v)) ? v : null;
  }

  function updatePreview() {
    const symbol = getSymbol();
    const tf = getTf().toUpperCase();
    const price = getPrice();
    const preview = document.getElementById('previewBox');
    const submitBtn = document.getElementById('submitBtn');
    const symbolMsg = document.getElementById('symbolMsg');
    const triggerMsg = document.getElementById('triggerMsg');

    symbolMsg.textContent = '';
    triggerMsg.textContent = '';

    if (!symbol) {
      preview.textContent = '請填寫商品與觸發條件';
      submitBtn.disabled = true;
      return;
    }
    if (!selectedIndicator && !price) {
      preview.textContent = `${symbol} ${tf} — 待選觸發條件`;
      submitBtn.disabled = true;
      return;
    }

    if (selectedIndicator && price) {
      // Indicator takes priority
      const label = indicatorLabel(selectedIndicator);
      preview.textContent = `${symbol} ${tf} ${label} （價格已忽略）`;
    } else if (selectedIndicator) {
      const label = indicatorLabel(selectedIndicator);
      preview.textContent = `${symbol} ${tf} ${label}`;
    } else {
      preview.textContent = `${symbol} ${tf} 價格 ${price}`;
    }
    submitBtn.disabled = false;
  }

  function indicatorLabel(ind) {
    if (ind.indicator === 'EMA') return `EMA${ind.param}`;
    const band = ind.param === 'UPPER' ? '上軌' : '下軌';
    return `BB ${band}`;
  }

  function submit() {
    const symbol = getSymbol();
    const tf = getTf();
    const price = getPrice();

    if (!symbol) {
      document.getElementById('symbolMsg').textContent = '請輸入商品';
      return;
    }
    if (!selectedIndicator && !price) {
      document.getElementById('triggerMsg').textContent = '請填寫價格或選擇指標';
      return;
    }

    let payload;
    if (selectedIndicator) {
      payload = {
        mode: 'indicator',
        symbol: symbol,
        timeframe: tf,
        indicator: selectedIndicator.indicator,
        param: selectedIndicator.param,
      };
    } else {
      payload = {
        mode: 'price',
        symbol: symbol,
        timeframe: tf,
        price: price,
      };
    }

    if (tg) {
      tg.sendData(JSON.stringify(payload));
    } else {
      alert('僅限在 Telegram 內使用\n\nPayload:\n' + JSON.stringify(payload, null, 2));
    }
  }
</script>
</body>
</html>
